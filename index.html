<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HKDV Trader OS</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="app-shell">

  <header class="top-nav">
    <div class="brand">HKDV</div>
  </header>

  <main class="page-shell">

    <h1>Inventory</h1>

    <div class="item-grid">

      <!-- TARGET ITEM -->
      <article class="item-card target-card">
        <h3>HK Lamp</h3>
        <p>SR • Petite • Medium Demand</p>
        <button class="primary-btn" id="open-offer-builder">Make Offer</button>
      </article>

      <!-- USER INVENTORY -->
      <article class="item-card selectable" data-value="100">
        <h3>HK Plush</h3>
        <p>SSR • Sweet • High</p>
      </article>

      <article class="item-card selectable" data-value="60">
        <h3>HK Lamp</h3>
        <p>SR • Petite • Medium</p>
      </article>

      <article class="item-card selectable" data-value="30">
        <h3>HK Chair</h3>
        <p>R • Lucky • Low</p>
      </article>

    </div>

  </main>

</div>

<!-- OFFER MODAL -->
<div class="modal-overlay hidden" id="offer-modal">
  <div class="modal-card">

    <div class="modal-header">
      <h2>Make Offer</h2>
      <button id="close-offer" class="modal-close">×</button>
    </div>

    <div class="offer-section">
      <h3>You Want</h3>
      <div class="offer-box target-box">
        HK Lamp (SR • Petite)
      </div>
    </div>

    <div class="offer-section">
      <h3>You Offer</h3>
      <div id="offer-items" class="offer-box empty">
        Select items below
      </div>
    </div>

    <div class="offer-section">
      <h3>Fairness</h3>
      <div id="fairness-indicator" class="fairness neutral">
        No offer yet
      </div>
    </div>

    <div class="modal-footer">
      <button class="secondary-btn" id="cancel-offer">Cancel</button>
      <button class="primary-btn">Send Offer</button>
    </div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
