<!-- ONLY MODAL CHANGED BELOW -->

<div class="modal-overlay hidden" id="list-modal-overlay">
  <div class="modal-card">

    <div class="modal-header">
      <h2>List Item</h2>
      <button class="modal-close-btn" id="close-list-modal-btn">×</button>
    </div>

    <div class="modal-item-preview">
      <div class="modal-item-thumb">Item</div>
      <div class="modal-item-info">
        <h3>HK Lamp</h3>

        <div class="modal-signal-row">
          <span class="item-badge item-badge-sr">SR</span>
          <span class="collection-chip">Petite Collection</span>
          <span class="demand-chip demand-medium">Medium Demand</span>
        </div>

        <p>You own: 3</p>
      </div>
    </div>

    <!-- NEW: LISTING TYPE -->
    <div class="modal-section">
      <span class="modal-label">Listing Type</span>
      <div class="option-row">
        <button class="option-btn active">Open to Offers</button>
        <button class="option-btn">Wishlist Priority</button>
      </div>
    </div>

    <!-- NEW: LOOKING FOR -->
    <div class="modal-section">
      <span class="modal-label">Looking For</span>
      <div class="option-row">
        <button class="option-btn">SSR</button>
        <button class="option-btn">SR</button>
        <button class="option-btn">Sweet</button>
        <button class="option-btn">Event</button>
      </div>
    </div>

    <!-- KEEP QUANTITY -->
    <div class="modal-section">
      <label class="modal-label">Quantity to list</label>
      <div class="quantity-stepper">
        <button class="stepper-btn" id="decrease-qty-btn">−</button>
        <div class="stepper-value" id="quantity-display">1</div>
        <button class="stepper-btn" id="increase-qty-btn">+</button>
      </div>
    </div>

    <!-- OPTIONAL NOTE -->
    <div class="modal-section">
      <label class="modal-label">Notes (optional)</label>
      <input class="modal-input" placeholder="Looking for Sweet SSR only" />
    </div>

    <div class="modal-footer">
      <button class="secondary-btn" id="cancel-list-modal-btn">Cancel</button>
      <button class="primary-btn">Post Listing</button>
    </div>

  </div>
</div>
